---
- name: Set "_packages"
  ansible.builtin.set_fact:
    _packages: "{{ (lookup('file', playbook_dir + '/' + packages_file) | from_yaml).packages }}"

- name: Install packages via Homebrew
  community.general.homebrew:
    name: "{{ _packages }}"
    state: present
    path: "{{ '/home/linuxbrew/.linuxbrew/bin' if 'linux' in group_names else omit }}"
  when: _packages | length > 0
